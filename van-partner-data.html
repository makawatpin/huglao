document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

bmit=\"{{ checkPasscode }}\" style=\"width:100%;max-width:380px;background:rgba(255,255,255,.06);border:1px solid rgba(227,189,99,.3);backdrop-filter:blur(8px);border-radius:20px;padding:32px 28px;\">\n      <div style=\"text-align:center;margin-bottom:22px;\">\n        <div style=\"font-family:'Noto Serif Thai',serif;font-size:1.3rem;font-weight:700;color:#fffaf0;margin-bottom:6px;\">ระบบข้อมูล Partner ภายใน<\u002Fdiv>\n        <div style=\"font-size:.85rem;color:#c9bd98;\">สำหรับเจ้าหน้าที่เท่านั้น กรุณากรอกรหัสผ่าน<\u002Fdiv>\n      <\u002Fdiv>\n      <input type=\"password\" placeholder=\"รหัสผ่าน\" value=\"{{ passInput }}\" sc-camel-on-change=\"{{ onPassInput }}\" sc-camel-auto-focus=\"{{ true }}\" style=\"width:100%;padding:14px 16px;border:1px solid rgba(227,189,99,.4);border-radius:12px;font-size:16px;min-height:50px;background:rgba(255,255,255,.08);color:#fffaf0;margin-bottom:12px;\">\n      <sc-if value=\"{{ hasPassError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:#ff9d8a;font-size:.82rem;margin-bottom:12px;\">{{ passError }}<\u002Fdiv><\u002Fsc-if>\n      <button type=\"submit\" style=\"width:100%;border:0;border-radius:999px;padding:14px;font-weight:700;font-size:1rem;cursor:pointer;background:linear-gradient(135deg,#a87815,#e3bd63 55%,#c8941f);color:#0a1f14;min-height:48px;\">เข้าสู่ระบบ<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ unlocked }}\" hint-placeholder-val=\"{{ false }}\">\n  <header style=\"position:sticky;top:0;z-index:40;background:#0e2318;padding:16px clamp(16px,4vw,40px);color:#f4ecd7;box-shadow:0 2px 12px rgba(0,0,0,.15);\">\n    <div style=\"max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <div>\n        <a href=\"index.html\" style=\"text-decoration:none;font-size:.76rem;color:#a9c2ab;font-weight:600;\">← กลับหน้าเว็บไซต์<\u002Fa>\n        <h1 style=\"margin:3px 0 0;font-family:'Noto Serif Thai',serif;font-size:clamp(1.1rem,2.4vw,1.45rem);font-weight:700;color:#fffaf0;\">ระบบเก็บข้อมูล Partner รถตู้ VIP<\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <sc-if value=\"{{ isDashboardTab }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size:.74rem;background:rgba(227,189,99,.1);padding:7px 13px;border-radius:999px;color:#e3bd63;white-space:nowrap;font-weight:700;\">🤖 AI Score เฉลี่ย {{ kpiAvgScore }}<\u002Fspan>\n        <\u002Fsc-if>\n        <span style=\"font-size:.74rem;color:#9fb3a3;white-space:nowrap;\">{{ saveMsg }}<\u002Fspan>\n        <button type=\"button\" sc-camel-on-click=\"{{ lock }}\" style=\"border:0;background:transparent;color:#c9bd98;font-size:.78rem;cursor:pointer;text-decoration:underline;\">ออกจากระบบ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1300px;margin:14px auto 0;display:flex;gap:4px;background:rgba(0,0,0,.18);padding:4px;border-radius:12px;\">\n      <button type=\"button\" sc-camel-on-click=\"{{ goDashboard }}\" style=\"flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:0;border-radius:10px;padding:11px 8px;font-weight:700;font-size:clamp(.72rem,3vw,.9rem);cursor:pointer;transition:background .2s;background:{{ tabDashboardStyle.background }};color:{{ tabDashboardStyle.color }};box-shadow:{{ tabDashboardStyle.boxShadow }};\">🗂️ Dashboard<\u002Fbutton>\n      <button type=\"button\" sc-camel-on-click=\"{{ goForm }}\" style=\"flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:0;border-radius:10px;padding:11px 8px;font-weight:700;font-size:clamp(.72rem,3vw,.9rem);cursor:pointer;transition:background .2s;background:{{ tabFormStyle.background }};color:{{ tabFormStyle.color }};box-shadow:{{ tabFormStyle.boxShadow }};\">📋 กรอกข้อมูล<\u002Fbutton>\n      <button type=\"button\" sc-camel-on-click=\"{{ goDatabase }}\" style=\"flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:0;border-radius:10px;padding:11px 8px;font-weight:700;font-size:clamp(.72rem,3vw,.9rem);cursor:pointer;transition:background .2s;background:{{ tabDatabaseStyle.background }};color:{{ tabDatabaseStyle.color }};box-shadow:{{ tabDatabaseStyle.boxShadow }};\">🗃️ Database<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"max-width:1300px;margin:0 auto;padding:22px clamp(14px,4vw,40px) 60px;\">\n\n    <sc-if value=\"{{ isFormTab }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;\">\n      <button type=\"button\" sc-camel-on-click=\"{{ exportJSON }}\" style=\"flex:1 1 200px;border:0;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a87815,#e3bd63 55%,#c8941f);color:#0a1f14;min-height:48px;\">สำรองข้อมูล (Export JSON)<\u002Fbutton>\n      <label style=\"flex:1 1 160px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer;background:#efe6d3;color:#193629;min-height:48px;\">นำเข้าข้อมูล<input type=\"file\" accept=\".json\" sc-camel-on-change=\"{{ importFile }}\" style=\"display:none;\"><\u002Flabel>\n      <button type=\"button\" sc-camel-on-click=\"{{ clearAll }}\" style=\"flex:1 1 160px;border:0;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer;background:#b42318;color:#fff;min-height:48px;\">ลบข้อมูลทั้งหมด<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div>\n\n      <!-- form card -->\n      <div style=\"background:#fff;border:1px solid #eae3d3;border-radius:16px;box-shadow:0 1px 3px rgba(20,35,26,.05);overflow:hidden;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid #eae3d3;flex-wrap:wrap;\">\n          <h2 style=\"margin:0;color:#0a1f14;font-size:1.05rem;font-family:'Noto Serif Thai',serif;font-weight:700;\">\n \" style=\"width:100%;padding:10px 11px;border:1px solid #cfc3ad;border-radius:10px;font-size:16px;min-height:44px;background:#fffdf8;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#c8941f;box-shadow:0 0 0 3px rgba(200,148,31,.15);outline:none;\"><\u002Fdiv>\n            <div><label style=\"font-weight:700;font-size:12px;color:#5c6b5e;text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:5px;\">เบอร์โทร<\u002Flabel><input value=\"{{ form.phone }}\" sc-camel-on-change=\"{{ handlers.phone }}\" style=\"width:100%;padding:10px 11px;border:1px solid #cfc3ad;border-radius:10px;font-size:16px;min-height:44px;background:#fffdf8;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#c8941f;box-shadow:0 0 0 3px rgba(200,148,31,.15);outline:none;\"><\u002Fdiv>\n            <div><label style=\"font-weight:700;font-size:12px;color:#5c6b5e;text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:5px;\">LINE ID / WhatsApp<\u002Flabel><input value=\"{{ form.line }}\" sc-camel-on-change=\"{{ handlers.line }}\" style=\"width:100%;padding:10px 11px;border:1px solid #cfc3ad;border-radius:10px;font-size:16px;min-height:44px;background:#fffdf8;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#c8941f;box-shadow:0 0 0 3px rgba(200,148,31,.15);outline:none;\"><\u002Fdiv>\n            <div><label style=\"font-weight:700;font-size:12px;color:#5c6b5e;text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:5px;\">Email<\u002Flabel><input value=\"{{ form.email }}\" sc-camel-on-change=\"{{ handlers.email }}\" style=\"width:100%;padding:10px 11px;border:1px solid #cfc3ad;border-radius:10px;font-size:16px;min-height:44px;background:#fffdf8;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#c8941f;box-shadow:0 0 0 3px rgba(200,148,31,.15);outline:none;\"><\u002Fdiv>\n            <div><label style=\"font-weight:700;font-size:12px;color:#5c6b5e;text .handlers[k] = (e) => this.setField(k, e.target.value); });\n    this.checkHandlers = {};\n    this.checkKeys.forEach(k => { this.checkHandlers[k] = (e) => this.setField(k, e.target.checked); });\n    this.fileHandlers = {};\n    this.fileKeys.forEach(k => { this.fileHandlers[k] = (e) => { this.addImages(k, e.target.files); e.target.value = ''; }; });\n    this.state.form = this.emptyForm();\n  }\n\n  emptyForm() {\n    const f = {};\n    this.fieldKeys.forEach(k => f[k] = '');\n    this.checkKeys.forEach(k => f[k] = false);\n    this.fileKeys.forEach(k => f[k] = []);\n    f.vehicleType = 'รถตู้ VIP';\n    f.insurance = 'รอตรวจสอบ';\n    f.license = 'รอตรวจสอบ';\n    f.fuel = 'รวม';\n    f.driverIncluded = 'รวม';\n    f.status = 'New Lead';\n    return f;\n  }\n\n  componentDidMount() {\n    this.setState({ mounted: true });\n    try {\n      this.sb = window.supabase.createClient(this.SUPABASE_URL, this.SUPABASE_KEY);\n    } catch (e) {\n      this.setState({ saveMsg: 'เชื่อมต่อฐานข้อมูลไม่สำเร็จ' });\n    }\n    this.loadRecords();\n    try {\n      if (sessionStorage.getItem('huglao_van_partner_auth') === 'ok') this.setState({ unlocked: true });\n    } catch (e) {}\n  }\n\n  loadRecords = async () => {\n    if (!this.sb) return;\n    this.setState({ saveMsg: 'กำลังโหลดข้อมูล…' });\n    const { data, error } = await this.sb.from('partners').select('*').order('created_at', { ascending: false });\n    if (error) {\n      this.setState({ saveMsg: 'โหลดข้อมูลไม่สำเร็จ: ' + error.message });\n      return;\n    }\n    const records = (data || []).map(row => ({\n      ...row.payload,\n      id: row.id,\n      company: row.company,\n      status: row.status,\n      updatedAt: row.updated_at ? new Date(row.updated_at).toLocaleString('th-TH') : ''\n    }));\n    this.setState({ records, saveMsg: 'พร้อมใช้งาน • เชื่อมต่อฐานข้อมูลแล้ว' });\n  };\n\n  onPassInput = (e) => this.setState({ passInput: e.target.value, passError: '' });\n\n  checkPasscode = (e) => {\n    e.preventDefault();\n    if (this.state.passInput === this.PASSCODE) {\n      try { sessionStorage.setItem('huglao_van_partner_auth', 'ok'); } catch (e2) {}\n      this.setState({ unlocked: true, passError: '' });\n    } else {\n      this.setState({ passError: 'รหัสไม่ถูกต้อง กรุณาลองใหม่' });\n    }\n  };\n\n  lock = () => {\n    try { sessionStorage.removeItem('huglao_van_partner_auth'); } catch (e) {}\n    this.setState({ unlocked: false, passInput: '' });\n  };\n\n  setField(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v } })); }\n\n  addImages(k, fileList) {\n    const files = Array.from(fileList || []).slice(0, 3);\n    files.forEach(file => {\n      const reader = new FileReader();\n      reader.onload = (e) => {\n        this.setState(s => {\n          const current = Array.isArray(s.form[k]) ? s.form[k] : [];\n          if (current.length >= 3) return s;\n          return { form: { ...s.form, [k]: [...current, e.target.result] } };\n        });\n      };\n      reader.readAsDataURL(file);\n    });\n  }\n\n  imageFieldVals() {\n    const out = {};\n    const nameMap = { imgCar: 'car', imgInside: 'inside', imgDriver: 'driver', imgDoc: 'doc', imgOther: 'other' };\n    this.fileKeys.forEach(k => {\n      const prefix = nameMap[k];\n      const items = Array.isArray(this.state.form[k]) ? this.state.form[k] : [];\n      out[prefix + 'CountLabel'] = items.length + '/3';\n      out[prefix + 'CanAddMore'] = items.length < 3;\n      out[prefix + 'HasThumbs'] = items.length > 0;\n      out[prefix + 'ThumbEls'] = items.map((url, idx) => React.createElement('div', {\n        key: k + idx,\n        style: { position: 'relative', width: '64px', height: '64px', borderRadius: '10px', overflow: 'hidden', border: '1px solid #cfc3ad', flex: 'none' }\n      }, [\n        React.createElement('img', { key: 'img', src: url, style: { width: '100%', height: '100%', objectFit: 'cover' } }),\n        React.createElement('button', {\n          key: 'btn', type: 'button', onClick: () => this.removeImage(k, idx),\n          style: { position: 'absolute', top: '2px', right: '2px', width: '20px', height: '20px', borderRadius: '50%', border: 0, background: 'rgba(180,35,24,.9)', color: '#fff', fontSize: '12px', lineHeight: 1, cursor: 'pointer' }\n        }, '✕')\n      ]));\n    });\n    return out;\n  }\n\n  removeImage(k, idx) {\n    this.setState(s => {\n      const current = Array.isArray(s.form[k]) ? s.form[k] : [];\n      const next = current.filter((_, i) => i !== idx);\n      return { form: { ...s.form, [k]: next } };\n    });\n  }\n\n  submit = async (e) => {\n    e.preventDefault();\n    if (!this.sb) return;\n    const f = this.state.form;\n    const row = { company: f.company, status: f.status, payload: f, updated_at: new Date().toISOString() };\n    this.setState({ saveMsg: 'กำลังบันทึก…' });\n    let error;\n    if (this.state.editId !== null) {\n      ({ error } = await this.sb.from('partners').update(row).eq('id', this.state.editId));\n    } else {\n      ({ error } = await this.sb.from('partners').insert([row]));\n    }\n    if (error) { this.setState({ saveMsg: 'บันทึกไม่สำเร็จ: ' + error.message }); return; }\n    this.setState({ form: this.emptyForm(), editId: null });\n    await this.loadRecords();\n    this.setState({ saveMsg: 'บันทึกแล้ว • ' + new Date().toLocaleTimeString('th-TH') });\n  };\n\n  editRecord(id) {\n    const rec = this.state.records.find(r => r.id === id);\n    if (!rec) return;\n    const merged = { ...this.emptyForm(), ...rec };\n    this.fileKeys.forEach(k => { merged[k] = Array.isArray(rec[k]) ? rec[k] : (rec[k] ? [rec[k]] : []); });\n    this.setState({ form: merged, editId: id, saveMsg: 'กำลังแก้ไข Partner' });\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  deleteRecord = async (id) => {\n    if (!confirm('ต้องการลบข้อมูลนี้หรือไม่?')) return;\n    if (!this.sb) return;\n    const { error } = await this.sb.from('partners').delete().eq('id', id);\n    if (error) { this.setState({ saveMsg: 'ลบไม่สำเร็จ: ' + error.message }); return; }\n    await this.loadRecords();\n  };\n\n  clearForm = () => { this.setState({ form: this.emptyForm(), editId: null, saveMsg: 'ล้างแบบฟอร์มแล้ว' }); };\n\n  openGuide = () => this.setState({ showGuide: true });\n  closeGuide = () => this.setState({ showGuide: false });\n\n  onSearch = (e) => this.setState({ searchQ: e.target.value });\n  onFilterStatus = (e) => this.setState({ filterStatus: e.target.value });\n  onFilterLevel = (e) => this.setState({ filterLevel: e.target.value });\n  onSortBy = (e) => this.setState({ sortBy: e.target.value });\n  clearFilters = () => this.setState({ searchQ: '', filterStatus: 'ทุกสถานะ', filterLevel: 'ทุกระดับ', sortBy: 'AI Score สูงสุด' });\n\n  onSearch = (e) => this.setState({ searchQ: e.target.value });\n  onFilterStatus = (e) => this.setState({ filterStatus: e.target.value });\n  onFilterLevel = (e) => this.setState({ filterLevel: e.target.value });\n  onSortBy = (e) => this.setState({ sortBy: e.target.value });\n  clearFilters = () => this.setState({ searchQ: '', filterStatus: 'ทุกสถานะ', filterLevel: 'ทุกระดับ', sortBy: 'AI Score สูงสุด' });\n\n  goForm = () => this.setState({ activeTab: 'form' });\n  goDashboard = () => this.setState({ activeTab: 'dashboard' });\n  goDatabase = () => this.setState({ activeTab: 'database' });\n\n  clearAll = async () => {\n    if (!confirm('ลบข้อมูล Partner ทั้งหมดในฐานข้อมูลหรือไม่? (ลบแล้วกู้คืนไม่ได้)')) return;\n    if (!this.sb) return;\n    this.setState({ saveMsg: 'กำลังลบข้อมูลทั้งหมด…' });\n    const { error } = await this.sb.from('partners').delete().gte('created_at', '1900-01-01');\n    if (error) { this.setState({ saveMsg: 'ลบไม่สำเร็จ: ' + error.message }); return; }\n    await this.loadRecords();\n  };\n\n  exportJSON = () => {\n    const payload = { app: 'HUGLAO Van Partner Data', version: '2.0', exportedAt: new Date().toISOString(), records: this.state.records };\n    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'huglao_van_partner_backup.json';\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 400);\n  };\n\n  importFile = (e) => {\n    const file = e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = async (ev) => {\n      try {\n        const payload = JSON.parse(ev.target.result);\n        const records = payload.records || payload.data || [];\n        if (!Array.isArray(records)) throw new Error('bad format');\n        if (!confirm('นำเข้าข้อมูล ' + records.length + ' รายการ เพิ่มเข้าฐานข้อมูลหรือไม่?')) return;\n        this.setState({ saveMsg: 'กำลังนำเข้าข้อมูล…' });\n        const rows = records.map(f => ({ company: f.company, status: f.status, payload: f, updated_at: new Date().toISOString() }));\n        const { error } = await this.sb.from('partners').insert(rows);\n        if (error) { this.setState({ saveMsg: 'นำเข้าไม่สำเร็จ: ' + error.message }); return; }\n        await this.loadRecords();\n        this.setState({ saveMsg: 'นำเข้าข้อมูลแล้ว • ' + new Date().toLocaleTimeString('th-TH') });\n      } catch (err) { alert('นำเข้าไม่สำเร็จ: ไฟล์ไม่ถูกต้อง'); }\n    };\n    reader.readAsText(file);\n    e.target.value = '';\n  };\n\n  getPrices(x) {\n    const vals = [x.priceVientiane, x.priceVangVieng, x.priceMuangFueng, x.priceLuangPrabang,\n      x.pricePackage2D ? this.num(x.pricePackage2D) / 2 : 0, x.pricePackage3D ? this.num(x.pricePackage3D) / 3 : 0];\n    return vals.map(v => this.num(v)).filter(Boolean);\n  }\n  num(v) { const n = Number(v); return Number.isFinite(n) && n > 0 ? n : 0; }\n  startPrice(x) { const p = this.getPrices(x); return p.length ? Math.min(...p) : 0; }\n\n  analyze(x, all) {\n    let quality = 35;\n    ['chkClean', 'chkSafe', 'chkUniform', 'chkPunctual', 'chkDoc', 'chkPhoto'].forEach(k => { if (x[k]) quality += 8; });\n    if (x.insurance === 'มี') quality += 7;\n    if (x.license === 'มี') quality += 7;\n    quality = Math.max(0, Math.min(100, quality));\n\n    const own = this.startPrice(x);\n    const pool = all.flatMap(r => this.getPrices(r)).filter(Boolean).sort((a, b) => a - b);\n    let price = 50;\n    if (own && pool.length) {\n      const min = pool[0], max = pool[pool.length - 1];\n      price = max > min ? Math.round(100 - ((own - min) / (max - min)) * 60) : 75;\n      price = Math.max(0, Math.min(100, price));\n    }\n\n    let completeness = 0;\n    ['company', 'contact', 'phone', 'serviceArea', 'vehicleType', 'model', 'fleet', 'insurance', 'license', 'payment'].forEach(k => { if (x[k]) completeness += 6; });\n    const imgCount = ['imgCar', 'imgInside', 'imgDriver', 'imgDoc', 'imgOther'].reduce((n, k) => n + (Array.isArray(x[k]) ? x[k].length : (x[k] ? 1 : 0)), 0);\n    if (imgCount > 0) completeness += 10;\n    completeness = Math.max(0, Math.min(100, completeness));\n\n    const fleet = Math.min(100, this.num(x.fleet) * 12);\n    let overall = Math.round(quality * .38 + price * .27 + completeness * .23 + fleet * .12);\n    overall = Math.max(0, Math.min(100, overall));\n\n    const position = (overall >= 78 && quality >= 78) ? 'Premium Partner' : (price >= 78 && own) ? 'Competitive Price Partner' : 'Development Partner';\n\n    const strengths = [];\n    if (quality >= 80) strengths.push('มาตรฐานบริการและความปลอดภัยอยู่ในระดับดี');\n    if (price >= 78) strengths.push('ราคาสามารถแข่งขันได้ดีในตลาด');\n    if (completeness >= 80) strengths.push('ข้อมูลและเอกสารครบถ้วน');\n    if (fleet >= 60) strengths.push('มีจำนวนรถรองรับงานได้หลากหลาย');\n\n    const risks = [];\n    if (x.insurance !== 'มี') risks.push('ประกันภัยยังไม่ยืนยัน');\n    if (x.license !== 'มี') risks.push('ใบอนุญาตขนส่งยังไม่ยืนยัน');\n    if (imgCount === 0) risks.push('ยังไม่มีรูปภาพประกอบ');\n    if (!own) risks.push('ยังไม่ได้ระบุราคา');\n\n    return { overall, price, quality, completeness, position, strengths, risks };\n  }\n\n  positionColors(p) {\n    const map = {\n      'Premium Partner': ['#fff2c9', '#7a5a00'],\n      'Competitive Price Partner': ['#d8f5e6', '#046b3c'],\n      'Development Partner': ['#e8e6dc', '#5b5646']\n    };\n    return map[p] || ['#eee', '#333'];\n  }\n\n  statusColors(s) {\n    const map = {\n      'New Lead': ['#dbe9ff', '#174ea6'],\n      'Contacted': ['#fff2c9', '#7a5a00'],\n      'รอตรวจรถ': ['#e2f5e7', '#137333'],\n      'Approved Partner': ['#d8f5e6', '#046b3c'],\n      'Reject': ['#fde3e3', '#b42318']\n    };\n    return map[s] || ['#eee', '#333'];\n  }\n\n  tabStyle(active) {\n    return active\n      ? { background: 'linear-gradient(135deg,#a87815,#e3bd63 55%,#c8941f)', color: '#0a1f14', boxShadow: '0 6px 16px rgba(168,120,21,.35)' }\n      : { background: 'transparent', color: '#6b7266', boxShadow: 'none' };\n  }\n\n  money(v) {\n    if (v === undefined || v === null || v === '') return '-';\n    const n = Number(v);\n    return Number.isFinite(n) ? n.toLocaleString('th-TH') : String(v);\n  }\n\n  mainPrice(x) {\n    return x.priceVientiane || x.priceVangVieng || x.priceMuangFueng || x.priceLuangPrabang || x.pricePackage2D || x.pricePackage3D || '';\n  }\n\n  renderVals() {\n    const records = this.state.records;\n    const analyses = records.map(r => this.analyze(r, records));\n    const avgScore = analyses.length ? Math.round(analyses.reduce((s, a) => s + a.overall, 0) / analyses.length) : 0;\n    let recordsView = records.map((raw, i) => {\n      const r = { ...this.emptyForm(), updatedAt: '', ...raw };\n      const [bg, color] = this.statusColors(r.status);\n      const a = analyses[i];\n      const [posBg, posColor] = this.positionColors(a.position);\n      return { ...r, idx: i, statusBg: bg, statusColor: color, mainPriceDisplay: this.money(this.mainPrice(r)),\n        aiScore: a.overall, aiPosition: a.position, aiPosBg: posBg, aiPosColor: posColor,\n        rowBg: i % 2 === 0 ? '#fffdf8' : '#fbf8f1',\n        hasImgCar: Array.isArray(r.imgCar) ? r.imgCar.length > 0 : !!r.imgCar,\n        noImgCar: Array.isArray(r.imgCar) ? r.imgCar.length === 0 : !r.imgCar,\n        onEdit: () => this.editRecord(raw.id), onDelete: () => this.deleteRecord(raw.id) };\n    });\n\n    const q = (this.state.searchQ || '').toLowerCase();\n    let filteredView = recordsView.filter(r => {\n      if (q) {\n        const hay = [r.company, r.model, r.serviceArea].join(' ').toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\n      if (this.state.filterStatus !== 'ทุกสถานะ' && r.status !== this.state.filterStatus) return false;\n      if (this.state.filterLevel !== 'ทุกระดับ' && r.aiPosition !== this.state.filterLevel) return false;\n      return true;\n    });\n    const sortBy = this.state.sortBy;\n    filteredView = filteredView.slice().sort((a, b) => {\n      if (sortBy === 'AI Score สูงสุด') return b.aiScore - a.aiScore;\n      if (sortBy === 'ราคาต่ำสุด') return this.num(this.mainPrice(a)) - this.num(this.mainPrice(b));\n      if (sortBy === 'ล่าสุด') return (b.updatedAt || '').localeCompare(a.updatedAt || '');\n      return 0;\n    });\n    return {\n      form: this.state.form,\n      handlers: this.handlers,\n      checkHandlers: this.checkHandlers,\n      fileHandlers: this.fileHandlers,\n      recordsView,\n      dashboardView: filteredView,\n      hasFilteredRecords: filteredView.length > 0,\n      noFilteredRecords: filteredView.length === 0,\n      searchQ: this.state.searchQ,\n      filterStatus: this.state.filterStatus,\n      filterLevel: this.state.filterLevel,\n      sortBy: this.state.sortBy,\n      onSearch: this.onSearch,\n      onFilterStatus: this.onFilterStatus,\n      onFilterLevel: this.onFilterLevel,\n      onSortBy: this.onSortBy,\n      clearFilters: this.clearFilters,\n      hasRecords: records.length > 0,\n      noRecords: records.length === 0,\n      guideOpen: !!this.state.showGuide,\n      openGuide: this.openGuide,\n      closeGuide: this.closeGuide,\n      unlocked: this.state.unlocked,\n      locked: !this.state.unlocked,\n      passInput: this.state.passInput,\n      passError: this.state.passError,\n      hasPassError: !!this.state.passError,\n      onPassInput: this.onPassInput,\n      checkPasscode: this.checkPasscode,\n      lock: this.lock,\n      isFormTab: this.state.activeTab === 'form',\n      isDashboardTab: this.state.activeTab === 'dashboard',\n      isDatabaseTab: this.state.activeTab === 'database',\n      tabFormStyle: this.tabStyle(this.state.activeTab === 'form'),\n      tabDashboardStyle: this.tabStyle(this.state.activeTab === 'dashboard'),\n      tabDatabaseStyle: this.tabStyle(this.state.activeTab === 'database'),\n      goForm: this.goForm,\n      goDashboard: this.goDashboard,\n      goDatabase: this.goDatabase,\n      mounted: !!this.state.mounted,\n      ...this.imageFieldVals(),\n      notEditing: this.state.editId === null,\n      kpiTotal: records.length,\n      kpiApproved: records.filter(r => r.status === 'Approved Partner').length,\n      kpiVisit: records.filter(r => r.status === 'รอตรวจรถ').length,\n      kpiFollow: records.filter(r => r.followDate).length,\n      kpiAvgScore: avgScore,\n      kpiPremium: analyses.filter(a => a.position === 'Premium Partner').length,\n      kpiCompetitive: analyses.filter(a => a.position === 'Competitive Price Partner').length,\n      kpiFleet: records.reduce((sum, r) => sum + (Number(r.fleet) || 0), 0),\n      isEditing: this.state.editId !== null,\n      saveMsg: this.state.saveMsg,\n      submit: this.submit,\n      clearForm: this.clearForm,\n      clearAll: this.clearAll,\n      exportJSON: this.exportJSON,\n      importFile: this.importFile\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
