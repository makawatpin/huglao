  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n  <\u002Fsection>\n\n  <!-- ===== ARTICLES ===== -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(44px,6vw,72px) clamp(20px,5vw,48px) clamp(80px,10vw,120px);\">\n\n    <!-- filter chips -->\n    <div class=\"hla-reveal\" style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:clamp(34px,5vw,52px);\">\n      <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <button sc-camel-on-click=\"{{ c.onSelect }}\" style=\"cursor:pointer;border:1.5px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font-family:inherit;font-weight:600;font-size:.92rem;padding:9px 20px;border-radius:999px;transition:all .25s ease;\">{{ c.name }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- loading -->\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 0;color:#5e6258;\">\n        <div style=\"width:34px;height:34px;border:3px solid #e3ddcc;border-top-color:#c8941f;border-radius:50%;animation:hla-spin .8s linear infinite;\"><\u002Fdiv>\n        <span style=\"font-size:.95rem;\">กำลังโหลดบทความ…<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- empty -->\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:70px 24px;color:#5e6258;\">\n        <div style=\"font-size:2rem;margin-bottom:10px;\">📝<\u002Fdiv>\n        <p style=\"margin:0;font-size:1.05rem;\">ยังไม่มีบทความในหมวดนี้<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- grid -->\n    <div class=\"hla-grid\">\n      <sc-for list=\"{{ articles }}\" as=\"a\" hint-placeholder-count=\"6\">\n        <article sc-camel-on-click=\"{{ a.open }}\" style=\"cursor:pointer;display:flex;flex-direction:column;background:#fff;border:1px solid #ece6d8;border-radius:18px;overflow:hidden;box-shadow:0 14px 34px rgba(10,31,20,.08);transition:transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s ease;\" style-hover=\"transform:translateY(-6px);box-shadow:0 26px 54px rgba(10,31,20,.16);\">\n          <div style=\"position:relative;aspect-ratio:16/10;overflow:hidden;background:#e8e3d6;\">\n            <img src=\"{{ a.cover }}\" alt=\"{{ a.title }}\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;top:12px;left:12px;font-size:.7rem;letter-spacing:.14em;font-weight:700;text-transform:uppercase;color:#0a1f14;background:linear-gradient(135deg,#e3bd63,#c8941f);padding:6px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(10,31,20,.25);\">{{ a.primaryTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;flex:1;padding:22px 22px 24px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;color:#8a8474;font-size:.8rem;font-weight:500;margin-bottom:10px;\">\n              <span style=\"color:#a87815;\">{{ a.author }}<\u002Fspan>\n              <span style=\"opacity:.5;\">·<\u002Fspan>\n              <span>{{ a.date }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"margin:0 0 10px;font-family:'Noto Serif Thai',serif;font-weight:700;font-size:1.26rem;line-height:1.35;color:#123524;\">{{ a.title }}<\u002Fh3>\n            <p style=\"margin:0 0 18px;color:#5e6258;font-size:.95rem;line-height:1.65;flex:1;\">{{ a.excerpt }}<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n              <sc-for list=\"{{ a.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <span style=\"font-size:.74rem;color:#7a7565;background:#f4f0e6;border:1px solid #ece6d8;padding:4px 11px;border-radius:999px;\">#{{ t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- sample notice -->\n    <sc-if value=\"{{ usingSample }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:38px;display:flex;align-items:flex-start;gap:12px;max-width:760px;margin-left:auto;margin-right:auto;background:#fff7e6;border:1px solid #f0dcab;border-radius:14px;padding:16px 20px;color:#8a6a18;font-size:.9rem;line-height:1.6;\">\n        <span style=\"font-size:1.1rem;flex:none;\">ℹ️<\u002Fspan>\n        <span>กำลังแสดง<strong>ตัวอย่างบทความ<\u002Fstrong> — เมื่อเชื่อมต่อ Google Sheet แล้ว บทความจริงที่ทีมงานกรอกจะขึ้นมาแทนที่อัตโนมัติ<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ===== READING OVERLAY ===== -->\n  <sc-if value=\"{{ selected }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeArticle }}\" class=\"hla-readwrap\" style=\"position:fixed;inset:0;z-index:200;background:rgba(8,18,11,.6);backdrop-filter:blur(4px);overflow-y:auto;padding:clamp(20px,5vh,64px) 20px;display:flex;justify-content:center;align-items:flex-start;\">\n      <article sc-camel-on-click=\"{{ stop }}\" class=\"hla-read\" style=\"position:relative;width:100%;background:#faf8f3;border-radius:22px;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.4);animation:hla-fade .4s ease both;\">\n        <button sc-camel-on-click=\"{{ closeArticle }}\" aria-label=\"ปิด\" style=\"position:absolute;top:16px;right:16px;z-index:3;width:42px;height:42px;border-radius:50%;border:none;background:rgba(10,31,20,.55);color:#fff;font-size:1.2rem;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;\" style-hover=\"background:rgba(10,31,20,.8);\">✕<\u002Fbutton>\n        <div style=\"position:relative;aspect-ratio:16/8;overflow:hidden;background:#123524;\">\n          <img src=\"{{ selected.cover }}\" alt=\"{{ selected.title }}\" style=\"width:100%;height:100%;object-fit:cover;\">\n          <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(8,18,11,.55),transparent 55%);\"><\u002Fdiv>\n          <span style=\"position:absolute;bottom:18px;left:clamp(20px,5vw,44px);font-size:.72rem;letter-spacing:.16em;font-weight:700;text-transform:uppercase;color:#0a1f14;background:linear-gradient(135deg,#e3bd63,#c8941f);padding:6px 14px;border-radius:999px;\">{{ selected.primaryTag }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(26px,4vw,44px) clamp(22px,5vw,56px) clamp(40px,5vw,60px);\">\n          <h2 style=\"margin:0;font-family:'Noto Serif Thai',serif;font-weight:700;font-size:clamp(1.6rem,3.6vw,2.4rem);line-height:1.25;color:#123524;\">{{ selected.title }}<\u002Fh2>\n          <div style=\"display:flex;align-items:center;gap:10px;margin:16px 0 0;padding-bottom:22px;border-bottom:1px solid #e6e0d2;color:#8a8474;font-size:.92rem;\">\n            <span style=\"color:#a87815;font-weight:600;\">{{ selected.author }}<\u002Fspan>\n            <span style=\"opacity:.5;\">·<\u002Fspan>\n            <span>{{ selected.date }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:24px;\">\n            <sc-for list=\"{{ selected.paragraphs }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <p style=\"margin:0 0 18px;color:#3a3d33;font-size:1.06rem;line-height:1.85;text-wrap:pretty;\">{{ p }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:26px;padding-top:24px;border-top:1px solid #e6e0d2;\">\n            <sc-for list=\"{{ selected.tags }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <span style=\"font-size:.82rem;color:#7a7565;background:#f1ece0;border:1px solid #e6e0d2;padding:6px 14px;border-radius:999px;\">#{{ t }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasRelated }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:30px;padding-top:24px;border-top:1px solid #e6e0d2;\">\n              <p style=\"margin:0 0 14px;font-weight:700;color:#123524;font-size:1rem;\">บทความที่เกี่ยวข้อง<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ related }}\" as=\"r\" hint-placeholder-count=\"2\">\n                  <a sc-camel-on-click=\"{{ r.open }}\" style=\"cursor:pointer;text-decoration:none;color:#a87815;font-weight:600;font-size:.95rem;\" style-hover=\"color:#c8941f;\">→ {{ r.title }}<\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <a href=\"HugLao%20Group.dc.html#contact\" style=\"display:inline-flex;align-items:center;gap:9px;margin-top:30px;padding:14px 28px;border-radius:999px;background:linear-gradient(135deg,#a87815,#e3bd63 55%,#c8941f);color:#0a1f14;font-weight:700;text-decoration:none;font-size:1rem;box-shadow:0 12px 28px rgba(168,120,21,.4);\" style-hover=\"transform:translateY(-2px);\">วางแผนทริปลาวกับเรา →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#0a1f14;color:#cfc9b6;padding:clamp(34px,5vw,52px) clamp(20px,5vw,48px);text-align:center;border-top:1px solid rgba(227,189,99,.18);\">\n    <img src=\"2b3dc50c-023c-4c3f-aebd-e233a64c1c83\" alt=\"HUGLAO\" style=\"height:46px;width:auto;margin:0 auto 16px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));\">\n    <p style=\"margin:0 0 6px;font-family:'Noto Serif Thai',serif;font-size:1.05rem;color:#f4ecd7;\">บริษัท ฮักลาว กรุ๊ป จำกัด<\u002Fp>\n    <p style=\"margin:0;font-size:.86rem;color:#8f8a78;\">Connecting Thailand &amp; Laos · เที่ยวลาวครบ จบในที่เดียว<\u002Fp>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  // ════════════════════════════════════════════════════════════════\n  //  ⚙️  ตั้งค่าตรงนี้ที่เดียว — วางลิงก์ CSV ของ Google Sheet ที่ Publish แล้ว\n  //  (File → Share → Publish to web → เลือกชีต → Comma-separated values (.csv))\n  //  ตัวอย่าง: \"https://docs.google.com/spreadsheets/d/e/XXXX/pub?gid=0&single=true&output=csv\"\n  //  ปล่อยว่าง = แสดงบทความตัวอย่าง\n  // ════════════════════════════════════════════════════════════════\n  static SHEET_CSV_URL = \"\";\n\n  // ════════════════════════════════════════════════════════════════\n  //  Contentful — ถ้ากรอกไว้ จะดึงบทความจาก Contentful ก่อน Google Sheet\n  // ════════════════════════════════════════════════════════════════\n  static CONTENTFUL_SPACE_ID = \"twrwgudtrvvh\";\n  static CONTENTFUL_ACCESS_TOKEN = \"UvlgigVYJN6bcq20IKT-0SyjcFJ12yajExjiIrjezuI\";\n\n  static SAMPLE = [\n    { title: \"เที่ยวหลวงพระบาง 3 วัน 2 คืน ฉบับสายชิล\", cover: \"assets/dest-luangprabang.png\", author: \"ทีมฮักลาว\", date: \"12 มิ.ย. 2026\", category: \"เส้นทางเที่ยว, หลวงพระบาง\",\n      content: \"หลวงพระบางคือเมืองมรดกโลกที่ผสมผสานวัฒนธรรมลาวกับสถาปัตยกรรมฝรั่งเศสได้อย่างลงตัว เหมาะกับทริปสายชิลที่ไม่ต้องเร่งรีบ\\nวันแรกแนะนำให้เดินเล่นวัดเชียงทอง ชมพระอาทิตย์ตกบนพูสี แล้วต่อด้วยตลาดมืดยามค่ำ\\nวันที่สองพาตัวเองไปน้ำตกตาดกวางสี เล่นน้ำสีฟ้าครามให้สดชื่น ก่อนกลับมาจิบกาแฟลาวริมแม่น้ำโขง\\nเช้าวันสุดท้ายอย่าพลาดตักบาตรข้าวเหนียว ประสบการณ์ที่หาไม่ได้จากที่ไหน\" },\n    { title: \"วังเวียง: บลูลากูน ล่องเรือ และบอลลูนยามเช้า\", cover: \"assets/dest-vangvieng.png\", author: \"พี่หนุ่ม ไกด์ลาว\", date: \"5 มิ.ย. 2026\", category: \"เส้นทางเที่ยว, ผจญภัย\",\n      content: \"วังเวียงเปลี่ยนจากเมืองแบ็คแพ็คมาเป็นจุดหมายผจญภัยระดับพรีเมียม ภูเขาหินปูนล้อมรอบเมืองสวยทุกมุม\\nกิจกรรมห้ามพลาดคือนั่งบอลลูนชมวิวยามเช้า มองเห็นสายหมอกปกคลุมแม่น้ำซอง\\nช่วงบ่ายล่องเรือคายัคหรือลอยห่วงยางสบาย ๆ แล้วแวะบลูลากูนเล่นน้ำ\\nเราจัดรถตู้ VIP รับส่งจากเวียงจันทน์ใช้เวลาเพียงราว 3 ชั่วโมงเท่านั้น\" },\n    { title: \"จองตั๋วรถไฟลาว–จีนยังไงให้ได้ที่นั่งชัวร์\", cover: \"assets/svc-train.png\", author: \"ทีมฮักลาว\", date: \"28 พ.ค. 2026\", category: \"เคล็ดลับ, รถไฟลาว-จีน\",\n      content: \"รถไฟความเร็วสูงลาว–จีนช่วยย่นเวลาเดินทางจากเวียงจันทน์ถึงหลวงพระบางเหลือไม่ถึง 2 ชั่วโมง\\nช่วงเทศกาลตั๋วเต็มเร็วมาก แนะนำให้จองล่วงหน้าอย่างน้อย 3–5 วัน\\nควรเตรียมพาสปอร์ตของผู้โดยสารทุกคนเพราะต้องใช้ระบุชื่อบนตั๋ว\\nให้ทีมฮักลาวช่วยจองได้เลย เราดูแลตั้งแต่จองที่นั่ง รับตั๋ว ไปจนถึงรับส่งสถานี\" },\n    { title: \"เวียงจันทน์ 1 วัน ไหว้พระ ชิมอาหาร เดินตลาดริมโขง\", cover: \"assets/dest-vientiane.png\", author: \"พี่แอน ทีมไทย\", date: \"20 พ.ค. 2026\", category: \"เส้นทางเที่ยว, เวียงจันทน์\",\n      content: \"เวียงจันทน์เป็นเมืองหลวงที่เที่ยวสบายในหนึ่งวัน เริ่มจากพระธาตุหลวงสัญลักษณ์ของชาติลาว\\nต่อด้วยประตูชัยและวัดสีเมืองเพื่อความเป็นสิริมงคล\\nมื้อกลางวันแนะนำเฝอลาวและข้าวจี่ปาเต๋รสชาติกลมกล่อม\\nปิดท้ายด้วยตลาดกลางคืนริมแม่น้ำโขง ชมพระอาทิตย์ตกฝั่งไทย–ลาว\" },\n    { title: \"ปากเซ–โบโลเวน เส้นทางไร่กาแฟและน้ำตก\", cover: \"assets/dest-pakse.png\", author: \"พี่หนุ่ม ไกด์ลาว\", date: \"14 พ.ค. 2026\", category: \"เส้นทางเที่ยว, ลาวใต้\",\n      content: \"ลาวใต้คือสวรรค์ของคนรักธรรมชาติ ที่ราบสูงโบโลเวนอากาศเย็นสบายตลอดปี\\nไร่กาแฟอาราบิก้าทอดยาวสุดสายตา แวะชิมกาแฟสดจากแหล่งปลูกได้เลย\\nน้ำตกตาดฟานและตาดเยืองยิ่งใหญ่อลังการ เหมาะกับการถ่ายรูป\\nทริปนี้เหมาะเดินทางด้วยรถตู้ VIP เพราะระยะทางไกลและแวะหลายจุด\" },\n    { title: \"รถตู้ VIP ลาว เลือกยังไงให้คุ้มและสบายตลอดทริป\", cover: \"assets/svc-van.png\", author: \"ทีมฮักลาว\", date: \"6 พ.ค. 2026\", category: \"เคล็ดลับ, รถตู้ VIP\",\n      content: \"การเช่ารถตู้พร้อมคนขับเป็นวิธีเที่ยวลาวที่ยืดหยุ่นและสบายที่สุด ไม่ต้องกังวลเรื่องเส้นทาง\\nรถตู้ VIP รุ่นใหม่นั่งสบาย แอร์เย็น มีที่วางสัมภาระเพียงพอสำหรับทริปหลายวัน\\nคนขับของเราพูดไทยได้และรู้เส้นทางท่องเที่ยวเป็นอย่างดี\\nควรแจ้งจำนวนผู้เดินทางและสัมภาระล่วงหน้า เพื่อให้เราจัดขนาดรถได้เหมาะสม\" }\n  ];\n\n  state = { rows: null, activeCat: \"ทั้งหมด\", selected: null, loading: true, usingSample: false };\n\n  componentDidMount() {\n    this.loadArticles();\n    this._io = new IntersectionObserver((es) => {\n      es.forEach(e => { if (e.isIntersecting) { e.target.classList.add(\"in\"); this._io.unobserve(e.target); } });\n    }, { threshold: 0.12 });\n    setTimeout(() => { (this._root || document).querySelectorAll(\".hla-reveal\").forEach(el => this._io.observe(el)); }, 60);\n    window.addEventListener(\"hashchange\", this.openFromHash);\n  }\n  componentWillUnmount() { if (this._io) this._io.disconnect(); document.body.style.overflow = \"\"; window.removeEventListener(\"hashchange\", this.openFromHash); }\n\n  setRoot = (el) => { this._root = el; };\n\n  async loadArticles() {\n    let rows = null, usingSample = false;\n\n    if (Component.CONTENTFUL_SPACE_ID && Component.CONTENTFUL_ACCESS_TOKEN) {\n      try { rows = await this.loadFromContentful(); } catch (e) { rows = null; }\n    }\n\n    if (!rows || !rows.length) {\n      const url = Component.SHEET_CSV_URL;\n      if (url) {\n        try {\n          const res = await fetch(url);\n          const text = await res.text();\n          rows = this.parseSheet(text);\n        } catch (e) { rows = null; }\n      }\n    }\n\n    if (!rows || !rows.length) { rows = this.normalize(Component.SAMPLE); usingSample = true; }\n    this.setState({ rows, loading: false, usingSample }, this.openFromHash);\n  }\n\n  async loadFromContentful() {\n    const base = \"https://cdn.contentful.com/spaces/\" + Component.CONTENTFUL_SPACE_ID + \"/environments/master/entries\";\n    const qs = \"?content_type=article&include=2&order=-fields.publishDate&access_token=\" + Component.CONTENTFUL_ACCESS_TOKEN;\n    const res = await fetch(base + qs);\n    if (!res.ok) throw new Error(\"contentful http \" + res.status);\n    const data = await res.json();\n    const assets = {};\n    (data.includes && data.includes.Asset || []).forEach(a => { assets[a.sys.id] = a; });\n\n    const out = (data.items || []).map(item => {\n      const f = item.fields || {};\n      const coverLink = f.cover && f.cover.sys && f.cover.sys.id;\n      const asset = coverLink ? assets[coverLink] : null;\n      const coverUrl = asset && asset.fields && asset.fields.file && asset.fields.file.url\n        ? \"https:\" + asset.fields.file.url : \"\";\n      const content = this.richTextToPlain(f.content);\n      const date = f.publishDate ? new Date(f.publishDate).toLocaleDateString(\"th-TH\", { year: \"numeric\", month: \"short\", day: \"numeric\" }) : \"\";\n      return this.makeArticle(f.title, coverUrl, content, f.author, f.category, date, f.slug);\n    });\n    return out;\n  }\n\n  // แปลง Contentful Rich Text document → ข้อความแบบพารากราฟ (คั่นด้วย \\n)\n  richTextToPlain(doc) {\n    if (!doc || !doc.content) return \"\";\n    const lines = [];\n    const walk = (node) => {\n      if (!node) return \"\";\n      if (node.nodeType === \"text\") return node.value || \"\";\n      if (node.content) return node.content.map(walk).join(\"\");\n      return \"\";\n    };\n    doc.content.forEach(node => {\n      const text = walk(node).trim();\n      if (text) lines.push(text);\n    });\n    return lines.join(\"\\n\");\n  }\n\n  // map raw sample objects → normalized article objects\n  normalize(list) {\n    return list.map(r => this.makeArticle(r.title, r.cover, r.content, r.author, r.category, r.date));\n  }\n\n  makeArticle(title, cover, content, author, category, date, slug) {\n    const tags = String(category || \"\").split(/[,/|]/).map(s => s.trim()).filter(Boolean);\n    const paragraphs = String(content || \"\").split(/\\n+/).map(s => s.trim()).filter(Boolean);\n    const excerpt = (paragraphs[0] || \"\").slice(0, 110) + ((paragraphs[0] || \"\").length > 110 ? \"…\" : \"\");\n    return {\n      title: title || \"(ไม่มีหัวข้อ)\",\n      slug: this.makeSlug(slug || title),\n      cover: this.driveImg(cover),\n      author: author || \"ทีมฮักลาว\",\n      date: date || \"\",\n      tags,\n      primaryTag: tags[0] || \"บทความ\",\n      excerpt,\n      paragraphs: paragraphs.length ? paragraphs : [\"(ยังไม่มีเนื้อหา)\"]\n    };\n  }\n\n  // สร้าง url slug จากหัวข้อ (ใส่คอลัมน์ \"slug\" ในชีตเพื่อกำหนดเอง)\n  makeSlug(s) {\n    return String(s || \"\").trim().toLowerCase()\n      .replace(/[^\\u0E00-\\u0E7Fa-z0-9]+/g, \"-\")\n      .replace(/^-+|-+$/g, \"\") || \"article\";\n  }\n\n  // แปลงลิงก์ Google Drive ทุกแบบ → ลิงก์รูปที่แสดงผลได้\n  driveImg(u) {\n    u = String(u || \"\").trim();\n    if (!u) return \"\";\n    const m = u.match(/\\/d\\/([-\\w]{20,})/) || u.match(/[?&]id=([-\\w]{20,})/);\n    if (m) return \"https://drive.google.com/thumbnail?id=\" + m[1] + \"&sz=w1200\";\n    return u; // ลิงก์รูปตรง (https://...jpg) หรือไฟล์ในโปรเจกต์\n  }\n\n  parseSheet(text) {\n    const grid = this.parseCSV(text);\n    if (grid.length < 2) return [];\n    const header = grid[0].map(h => h.trim().toLowerCase());\n    const find = (...keys) => header.findIndex(h => keys.some(k => h.includes(k)));\n    const iTitle = find(\"หัวข้อ\", \"title\", \"ชื่อ\");\n    const iCover = find(\"รูป\", \"ปก\", \"cover\", \"image\", \"ภาพ\");\n    const iContent = find(\"เนื้อหา\", \"content\", \"บทความ\", \"รายละเอียด\");\n    const iAuthor = find(\"ผู้เขียน\", \"author\", \"เขียนโดย\");\n    const iCat = find(\"หมวด\", \"แท็ก\", \"tag\", \"category\", \"ประเภท\");\n    const iDate = find(\"วันที่\", \"date\", \"เผยแพร่\");\n    const iSlug = find(\"slug\", \"url\", \"ลิงก์\");\n    const out = [];\n    for (let r = 1; r < grid.length; r++) {\n      const row = grid[r];\n      if (!row || row.every(c => !String(c).trim())) continue;\n      const g = (i) => (i >= 0 ? (row[i] || \"\") : \"\");\n      if (!String(g(iTitle)).trim() && !String(g(iContent)).trim()) continue;\n      out.push(this.makeArticle(g(iTitle), g(iCover), g(iContent), g(iAuthor), g(iCat), g(iDate), g(iSlug)));\n    }\n    return out;\n  }\n\n  parseCSV(text) {\n    const rows = []; let row = [], field = \"\", i = 0, inQ = false;\n    while (i < text.length) {\n      const ch = text[i];\n      if (inQ) {\n        if (ch === '\"') { if (text[i + 1] === '\"') { field += '\"'; i++; } else inQ = false; }\n        else field += ch;\n      } else {\n        if (ch === '\"') inQ = true;\n        else if (ch === \",\") { row.push(field); field = \"\"; }\n        else if (ch === \"\\r\") { /* skip */ }\n        else if (ch === \"\\n\") { row.push(field); rows.push(row); row = []; field = \"\"; }\n        else field += ch;\n      }\n      i++;\n    }\n    if (field.length || row.length) { row.push(field); rows.push(row); }\n    return rows;\n  }\n\n  setCat = (name) => () => this.setState({ activeCat: name });\n\n  open = (article) => () => {\n    document.body.style.overflow = \"hidden\";\n    this.setState({ selected: article });\n    history.pushState(null, \"\", \"#a/\" + article.slug);\n    document.title = article.title + \" | บทความ HUGLAO GROUP\";\n  };\n  closeArticle = () => {\n    document.body.style.overflow = \"\";\n    this.setState({ selected: null });\n    history.pushState(null, \"\", location.pathname + location.search);\n    document.title = \"บทความ & เรื่องเล่าเที่ยวลาว | HUGLAO GROUP\";\n  };\n  stop = (e) => { e.stopPropagation(); };\n\n  // เปิดบทความตาม #a/slug ในลิงก์ (deep link / internal link)\n  openFromHash = () => {\n    const m = location.hash.match(/^#a\\/(.+)/);\n    const rows = this.state.rows || [];\n    if (m && rows.length) {\n      const found = rows.find(a => a.slug === decodeURIComponent(m[1]));\n      if (found) { document.body.style.overflow = \"hidden\"; this.setState({ selected: found }); document.title = found.title + \" | บทความ HUGLAO GROUP\"; return; }\n    }\n    if (!m) { document.body.style.overflow = \"\"; this.setState({ selected: null }); }\n  };\n\n  renderVals() {\n    const rows = this.state.rows || [];\n    const active = this.state.activeCat;\n\n    // unique categories\n    const set = [];\n    rows.forEach(a => a.tags.forEach(t => { if (!set.includes(t)) set.push(t); }));\n    const catNames = [\"ทั้งหมด\", ...set];\n    const categories = catNames.map(name => {\n      const on = name === active;\n      return {\n        name,\n        onSelect: this.setCat(name),\n        bg: on ? \"linear-gradient(135deg,#a87815,#e3bd63 55%,#c8941f)\" : \"#fff\",\n        color: on ? \"#0a1f14\" : \"#5e6258\",\n        border: on ? \"transparent\" : \"#e0d9c8\"\n      };\n    });\n\n    const filtered = active === \"ทั้งหมด\" ? rows : rows.filter(a => a.tags.includes(active));\n    const articles = filtered.map(a => ({ ...a, open: this.open(a) }));\n\n    const sel = this.state.selected;\n    const related = sel\n      ? rows.filter(a => a !== sel && a.tags.some(t => sel.tags.includes(t))).slice(0, 3).map(a => ({ ...a, open: this.open(a) }))\n      : [];\n\n    return {\n      articles,\n      categories,\n      loading: this.state.loading,\n      isEmpty: !this.state.loading && articles.length === 0,\n      usingSample: this.state.usingSample,\n      selected: sel,\n      related,\n      hasRelated: related.length > 0,\n      closeArticle: this.closeArticle,\n      stop: this.stop\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
